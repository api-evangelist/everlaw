apis:
  - name: Everlaw REST API
    description: The Everlaw REST API provides programmatic access to the Everlaw eDiscovery platform, enabling automation of case management, document uploads, billing reporting, and analytics. API keys are required for authentication and are generated by Organization Admins. The API enforces a rate limit of 25 requests per second per authenticating account. Regional endpoints are available for US, UK, EU, Canada, and Australia deployments.
